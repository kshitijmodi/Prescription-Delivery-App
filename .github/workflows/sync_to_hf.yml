name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.GH_HF_PRESCRIPTIONDELIVERYAPP }}
        run: |
          git remote add hf https://iamkshitij:$HF_TOKEN@huggingface.co/spaces/iamkshitij/prescription-delivery-app
          git push hf main --force
